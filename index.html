<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İE’sra BAL 🍯 | Private Access</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--honey:#ffb347;--amber:#ff8c00;--dark:#050505;--glass:rgba(255,255,255,0.03)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--dark);color:#fff;overflow-x:hidden}

/* LOADING */
#loader{position:fixed;inset:0;background:var(--dark);z-index:9999;display:flex;align-items:center;justify-content:center}
.loader-text{font-size:24px;color:var(--honey);animation:pulse 1.5s infinite}

/* BG */
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 30% 40%,rgba(255,140,0,0.3) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(255,179,71,0.25) 0%,transparent 50%);filter:blur(150px);animation:drift 25s infinite alternate}
@keyframes drift{0%{transform:scale(1)}100%{transform:scale(1.15) translate(60px,-40px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* CARD */
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:10}
.card{width:min(92%,780px);background:var(--glass);backdrop-filter:blur(60px) saturate(180%);border:1px solid rgba(255,179,71,0.12);border-radius:52px;padding:90px 70px;text-align:center;animation:fadeUp 1.2s cubic-bezier(0.16,1,0.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}

.tag{display:inline-block;padding:10px 20px;border-radius:100px;background:rgba(255,179,71,0.1);border:1px solid rgba(255,179,71,0.25);color:var(--honey);font-size:11px;letter-spacing:2.5px;font-weight:600;margin-bottom:35px}

h1{font-size:clamp(60px,11vw,104px);font-weight:700;line-height:0.88;background:linear-gradient(180deg,#fff 0%,var(--honey) 55%,var(--amber) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-5px;margin-bottom:28px}

.sub{font-size:21px;color:#c0c0c0;line-height:1.9;font-weight:300;max-width:520px;margin:0 auto 45px}

/* LIVE COUNTER */
.live{display:inline-flex;align-items:center;gap:10px;background:rgba(255,179,71,0.08);border:1px solid rgba(255,179,71,0.2);padding:12px 22px;border-radius:100px;margin-bottom:35px;font-size:14px}
.dot{width:8px;height:8px;background:#00ff88;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* STATS */
.stats{display:flex;justify-content:center;gap:60px;margin:50px 0;flex-wrap:wrap}
.stat b{font-size:32px;color:var(--honey);display:block;font-weight:700}
.stat span{font-size:12px;color:#777;text-transform:uppercase;letter-spacing:1.5px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:14px;padding:24px 60px;border-radius:100px;background:linear-gradient(135deg,var(--honey),var(--amber));color:#000;text-decoration:none;font-weight:700;font-size:19px;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);box-shadow:0 15px 50px rgba(255,140,0,0.4);border:none;cursor:pointer;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:0.6s}
.btn:hover::before{left:100%}
.btn:hover{transform:translateY(-10px) scale(1.03);box-shadow:0 30px 80px rgba(255,179,71,0.7)}
.btn-outline{background:transparent;color:var(--honey);border:2px solid rgba(255,179,71,0.35);box-shadow:none;margin-top:18px}
.btn-outline:hover{background:rgba(255,179,71,0.1);border-color:var(--honey)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:70px}
.grid img{width:100%;aspect-ratio:1;border-radius:26px;border:1px solid rgba(255,179,71,0.12);object-fit:cover;transition:0.6s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
.grid img:hover{transform:translateY(-15px) scale(1.05);border-color:var(--honey);box-shadow:0 20px 50px rgba(255,140,0,0.3)}

/* POPUP NOTIF */
.notif{position:fixed;bottom:30px;left:30px;background:var(--glass);backdrop-filter:blur(30px);border:1px solid rgba(255,179,71,0.2);border-radius:20px;padding:18px 24px;display:flex;align-items:center;gap:15px;z-index:100;animation:slideIn 0.6s, fadeOut 0.6s 4.4s forwards;opacity:0}
@keyframes slideIn{from{transform:translateX(-120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0}}
.notif img{width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid var(--honey)}

/* EMAIL POPUP */
#emailPopup{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);z-index:998;display:none;align-items:center;justify-content:center}
.popup-box{width:min(90%,420px);background:var(--dark);border:1px solid rgba(255,179,71,0.2);border-radius:35px;padding:50px 40px;text-align:center}
.popup-box input{width:100%;padding:18px;border-radius:100px;border:1px solid rgba(255,179,71,0.3);background:rgba(255,255,255,0.05);color:#fff;margin:20px 0;font-size:16px;outline:none}
.popup-box input:focus{border-color:var(--honey)}

#gate{position:fixed;inset:0;background:rgba(5,5,5,0.99);backdrop-filter:blur(25px);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{width:min(90%,460px);background:var(--glass);border:1px solid rgba(255,179,71,0.18);border-radius:45px;padding:65px 55px;text-align:center}
.hidden{display:none !important}

@media(max-width:700px){.card{padding:55px 35px}.h1{font-size:54px}.stats{gap:30px}.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader"><div class="loader-text">BAL 🍯</div></div>

<div class="bg"></div>

<!-- 18+ GATE -->
<div id="gate">
    <div class="gate-box">
        <h1 style="font-size:52px">18+</h1>
        <p class="sub">Bu alan yetişkinler içindir.<br>Devam ederek yaşını onaylıyorsun.</p>
        <button onclick="enter()" class="btn"><i class="fas fa-unlock"></i> DEVAM ET
