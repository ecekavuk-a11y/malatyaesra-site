<!DOCTYPE html>
<html lang="tr">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap');
.serif { font-family: 'Playfair Display', serif; }
.sans { font-family: 'Inter', sans-serif; }
.gold { background: linear-gradient(90deg, #d4af37, #f5d76e, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
body { background: #050505; }
.glass { background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212,175,55,0.2); }
.btn-hover { transition: all 0.3s; }
.btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,175,55,0.25); }

<body class="text-white sans">

<!-- AGE GATE -->
<div id="gate" class="fixed inset-0 bg-black z-[999] flex items-center justify-center p-6">

  </div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">
  <section class="min-h-screen flex items-center justify-center text-center px-6 py-12">
    <div class="max-w-xl w-full">
      <p class="text-amber-400 tracking-[3px] text-xs mb-4">İE’SRA BAL • MALATYA</p>
      <h1 class="serif text-4xl md:text-6xl leading-tight gold mb-5">Sahne Arkası</h1>
      <p class="text-base text-neutral-300 mb-8 leading-relaxed">
        Teaser’lar, günlük anlar, özel paylaşımlar.<br>
        <span class="gold">Dışarıda göremeyeceklerin burada başlıyor.</span>
      </p>

      <div class="flex flex-col gap-3 mb-8">
        <a href="https://t.me/SENIN_UCRETSIZ_LINK" target="_blank" class="w-full py-4 bg-gradient-to-r from-blue-500 to-cyan-400 text-black font-bold rounded-xl btn-hover flex items-center justify-center gap-2">
          <i class="fab fa-telegram"></i> Ücretsiz Kanal
        </a>
        <a href="https://t.me/SENIN_VIP_LINK" target="_blank" class="w-full py-4 bg-gradient-to-r from-amber-500 to-yellow-400 text-black font-bold rounded-xl btn-hover flex items-center justify-center gap-2">
          <i class="fas fa-crown"></i> VIP Kanala Geç
        </a>
      </div>
    </div>
  </section>

  <footer class="py-8 text-center text-[11px] text-neutral-500">
    © 2026 İE’sra BAL • 18+ Private Vault
  </footer>
</div>

<script>
function enterSite() {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
}
</script>
</body>
</html>
